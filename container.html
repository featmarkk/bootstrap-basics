<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="static/css/bootstrap.min.css">
</head>
<body>
  <div class="border border-dark container bg-info">
    <p>A fixed width container</p>
  </div>
  <div class="border border-2 border-success container-fluid my-2 p-3">
    <p>Spans entire width</p>
  </div>
  <div class="border border-secondary bg-warning container-md ">
    <p>100% wide until the specified break point</p>
  </div>
  <div class="border border-secondary bg-danger container-sm my-5">
    <p>100% wide until the specified break point</p>
  </div>
  <div class="border border-secondary bg-secondary container-lg my-3">
    <p>100% wide until the specified break point</p>
  </div>
  
  <script src="static/js/bootstrap.min.js"></script>
  
</body>
</html>
